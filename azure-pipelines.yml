trigger:
  branches:
    include:
      - main
      - develop

name: $(Date:yyyyMMdd)$(Rev:rrr)

pool:
  vmImage: "ubuntu-latest"

variables:
  ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/develop') }}:
    NPM_VERSION_SUFFIX: "-dev"
    NPM_TAG: "dev"
  ${{ else }}:
    NPM_VERSION_SUFFIX: ""
    NPM_TAG: "latest"

steps:
  - task: UseNode@1
    inputs:
      version: "20.x"
    displayName: "Install Node.js"

  - script: |
      npm install
      npm run build
      npm test
      npm version 1.0.$(Build.BuildNumber)$(NPM_VERSION_SUFFIX) --no-git-tag-version --allow-same-version
    displayName: "Install dependencies, build, and test"

  - task: CopyFiles@2
    inputs:
      SourceFolder: "$(Build.SourcesDirectory)"
      Contents: "README.md"
      TargetFolder: "$(Build.ArtifactStagingDirectory)/dist"

  - task: CopyFiles@2
    inputs:
      SourceFolder: "$(Build.SourcesDirectory)"
      Contents: "LICENSE"
      TargetFolder: "$(Build.ArtifactStagingDirectory)/dist"

  - task: Npm@1
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/develop')))
    inputs:
      command: publish
      publishRegistry: useExternalRegistry
      publishEndpoint: "NPM"
      publishTag: "$(NPM_TAG)"
